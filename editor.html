<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LaTeX Editor — hw6</title>
<style>
  :root {
    --bg: #1e1e2e; --surface: #181825; --overlay: #313244;
    --text: #cdd6f4; --subtext: #a6adc8; --blue: #89b4fa;
    --green: #a6e3a1; --red: #f38ba8; --yellow: #f9e2af;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; height: 100vh; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }

  #editor-pane { width: 50%; display: flex; flex-direction: column; border-right: 2px solid var(--overlay); }
  #toolbar {
    padding: 8px 16px; background: var(--surface);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  #toolbar .title { font-size: 14px; font-weight: 700; }
  .spacer { flex: 1; }
  #status { font-size: 12px; padding: 3px 8px; border-radius: 4px; }
  .status-saved { color: var(--green); }
  .status-saving { color: var(--yellow); }
  .status-error { color: var(--red); }
  .btn {
    background: var(--overlay); color: var(--text); border: none;
    padding: 5px 12px; border-radius: 5px; cursor: pointer;
    font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  .btn:hover { background: var(--blue); color: var(--surface); }
  textarea#editor {
    flex: 1; background: var(--bg); color: var(--text); border: none;
    padding: 16px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px; line-height: 1.6; resize: none; outline: none; tab-size: 2;
  }
  #error-bar {
    display: none; padding: 8px 16px; background: #2a1520; color: var(--red);
    font-family: monospace; font-size: 12px; max-height: 100px; overflow-y: auto;
    border-top: 1px solid var(--red); flex-shrink: 0;
  }

  #preview-pane { width: 50%; display: flex; flex-direction: column; background: #525252; }
  #preview-toolbar {
    padding: 8px 16px; background: #f5f5f5; border-bottom: 1px solid #ddd;
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  #preview-toolbar .title { font-size: 14px; font-weight: 700; color: #333; }
  #preview-toolbar span.hint { font-size: 11px; color: #999; }
  iframe#pdf-view { flex: 1; border: none; background: #525252; }

  #version-panel {
    display: none; position: fixed; top: 0; right: 0; bottom: 0; width: 360px;
    background: var(--surface); border-left: 2px solid var(--overlay);
    flex-direction: column; z-index: 100; box-shadow: -4px 0 20px rgba(0,0,0,0.4);
  }
  #version-panel.open { display: flex; }
  #version-panel .header {
    padding: 12px 16px; border-bottom: 1px solid var(--overlay);
    display: flex; align-items: center; justify-content: space-between;
  }
  #version-panel .header h2 { font-size: 15px; }
  #version-list { flex: 1; overflow-y: auto; padding: 8px; }
  .version-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; }
  .version-item:hover { background: var(--overlay); }
  .version-item .hash { font-family: monospace; font-size: 12px; color: var(--blue); }
  .version-item .msg { font-size: 13px; margin-top: 2px; }
  .version-item .date { font-size: 11px; color: var(--subtext); margin-top: 2px; }
  .version-item .actions { margin-top: 6px; display: none; gap: 6px; }
  .version-item:hover .actions { display: flex; }
</style>
</head>
<body>

<div id="editor-pane">
  <div id="toolbar">
    <span class="title">file.tex</span>
    <span class="spacer"></span>
    <span id="status" class="status-saved">Saved</span>
    <button class="btn" onclick="copyTex()">Copy .tex</button>
    <button class="btn" onclick="toggleVersions()">Versions</button>
  </div>
  <textarea id="editor" spellcheck="false"></textarea>
  <div id="error-bar"></div>
</div>

<div id="preview-pane">
  <div id="preview-toolbar">
    <span class="title">PDF Preview</span>
    <span class="spacer"></span>
    <span class="hint">Compiles on save (Ctrl+S to force)</span>
  </div>
  <iframe id="pdf-view"></iframe>
</div>

<div id="version-panel">
  <div class="header">
    <h2>Version History</h2>
    <button class="btn" onclick="toggleVersions()">Close</button>
  </div>
  <div id="version-list"></div>
</div>

<script>
const editorEl = document.getElementById('editor');
const statusEl = document.getElementById('status');
const errorBar = document.getElementById('error-bar');
const pdfView = document.getElementById('pdf-view');

// ── Load ──
async function loadFile() {
  try {
    const resp = await fetch('/load');
    const data = await resp.json();
    editorEl.value = data.content;
    // Load existing PDF if available
    pdfView.src = '/pdf?' + Date.now();
  } catch (e) {
    setStatus('error', 'Load failed');
  }
}

// ── Save + compile ──
let saveTimer = null;
let saving = false;

function queueSave() {
  clearTimeout(saveTimer);
  setStatus('saving', 'Unsaved\u2026');
  saveTimer = setTimeout(doSave, 1000);
}

async function doSave() {
  if (saving) { queueSave(); return; }
  saving = true;
  setStatus('saving', 'Saving + compiling\u2026');
  errorBar.style.display = 'none';
  try {
    const resp = await fetch('/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: editorEl.value }),
    });
    const data = await resp.json();
    if (data.compile_error) {
      setStatus('error', 'Compile error');
      errorBar.textContent = data.compile_error;
      errorBar.style.display = 'block';
    } else {
      setStatus('saved', data.committed ? 'Saved \u2713 (new version)' : 'Saved \u2713');
      // Reload PDF — add cache-buster
      pdfView.src = '/pdf?' + Date.now();
    }
  } catch (e) {
    setStatus('error', 'Save failed \u2014 server running?');
  }
  saving = false;
}

function setStatus(type, text) {
  statusEl.textContent = text;
  statusEl.className = 'status-' + type;
}

// ── Editor events ──
editorEl.addEventListener('input', () => { queueSave(); });

editorEl.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editorEl.selectionStart;
    editorEl.value = editorEl.value.substring(0, s) + '  ' + editorEl.value.substring(editorEl.selectionEnd);
    editorEl.selectionStart = editorEl.selectionEnd = s + 2;
    queueSave();
  }
  if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    clearTimeout(saveTimer);
    doSave();
  }
});

// ── Copy for Overleaf ──
function copyTex() {
  navigator.clipboard.writeText(editorEl.value).then(() => {
    setStatus('saved', 'Copied to clipboard \u2713');
    setTimeout(() => setStatus('saved', 'Saved \u2713'), 2000);
  });
}

// ── Version history ──
function toggleVersions() {
  const panel = document.getElementById('version-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) loadVersions();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function loadVersions() {
  const list = document.getElementById('version-list');
  list.innerHTML = '<div style="padding:16px;color:var(--subtext)">Loading\u2026</div>';
  try {
    const resp = await fetch('/versions');
    const data = await resp.json();
    if (!data.commits.length) {
      list.innerHTML = '<div style="padding:16px;color:var(--subtext)">No versions yet.</div>';
      return;
    }
    list.innerHTML = data.commits.map((c, i) => `
      <div class="version-item" onclick="previewVersion('${c.hash}')">
        <div class="hash">${c.short}${i === 0 ? ' (current)' : ''}</div>
        <div class="msg">${esc(c.message)}</div>
        <div class="date">${c.date}</div>
        <div class="actions">
          ${i > 0 ? `<button class="btn" onclick="event.stopPropagation(); restoreVersion('${c.hash}')">Restore</button>` : ''}
        </div>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = '<div style="padding:16px;color:var(--red)">Failed to load.</div>';
  }
}

async function previewVersion(hash) {
  try {
    const resp = await fetch('/version/' + hash);
    const data = await resp.json();
    editorEl.value = data.content;
    setStatus('saving', 'Viewing old version \u2014 edit to save');
  } catch (e) {}
}

async function restoreVersion(hash) {
  if (!confirm('Restore this version? Current work is saved first.')) return;
  await doSave();
  try {
    const resp = await fetch('/restore', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ hash }),
    });
    const data = await resp.json();
    if (data.content) {
      editorEl.value = data.content;
      setStatus('saved', 'Restored \u2713');
      pdfView.src = '/pdf?' + Date.now();
      loadVersions();
    }
  } catch (e) {
    setStatus('error', 'Restore failed');
  }
}

loadFile();
</script>
</body>
</html>
